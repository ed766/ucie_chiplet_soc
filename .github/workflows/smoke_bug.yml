name: open-source-dv-gates

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

jobs:
  documentation-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate README metrics and validate links
        run: make -C chiplet_extension readme-metrics docs-check
      - name: Require reproducible documentation
        run: git diff --exit-code

  core-evidence:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Restore checksum-pinned RV32 toolchain
        run: make -C chiplet_extension rv32-toolchain-install rv32-toolchain-check

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography

      - name: Run stable closure and expected bug validation
        run: make -C chiplet_extension closure RANDOM_SEEDS=1 SEED=20260406

      - name: Run open-source frontend quality checks
        run: make -C chiplet_extension frontend-quality

      - name: Validate static UPF intent
        run: make -C chiplet_extension upf-check

      - name: Run firmware-driven RV32 integration suite
        run: make -C chiplet_extension firmware-soc-check

      - name: Run compiled-C and ISS co-verification suite
        run: make -C chiplet_extension firmware-c-check rv32-isa-check rv32-ebreak-check firmware-c-mutation-check timer-wfi-check firmware-c-compiler-matrix

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-bug-reports
          path: |
            chiplet_extension/reports/*.csv
            chiplet_extension/reports/*.md

  compiled-firmware-closure:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Verilator and restore pinned RV32 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator autoconf automake device-tree-compiler \
            libboost-program-options-dev libboost-regex-dev libboost-system-dev \
            libexpat1-dev libtool zlib1g-dev
          make -C chiplet_extension rv32-toolchain-install rv32-toolchain-check
      - name: Cache pinned external RISC-V tools
        uses: actions/cache@v4
        with:
          path: chiplet_extension/build/external_riscv_tools
          key: rv32-external-${{ runner.os }}-${{ hashFiles('chiplet_extension/verification/external_riscv_tools.lock.json') }}
      - name: Restore Spike, ACT4/Sail, riscv-formal, and OSS CAD Suite
        run: |
          python3 chiplet_extension/scripts/install_external_riscv_tools.py \
            --github-env "$GITHUB_ENV" --github-path "$GITHUB_PATH"
      - name: Verify pinned external revisions and archive checksums
        run: python3 chiplet_extension/scripts/check_external_riscv_tools.py --require
      - name: Run GCC/ISS closure, generated C, robustness, and RTL mutations
        run: make -C chiplet_extension firmware-c-closure firmware-c-generated-c-random firmware-c-compiler-matrix timer-wfi-check firmware-c-mutation-check firmware-c-rtl-mutation-check firmware-c-robustness-check
      - name: Require pinned external architectural lanes
        run: |
          python3 chiplet_extension/scripts/run_external_iss.py --require
          python3 chiplet_extension/scripts/run_act4.py --require
          python3 chiplet_extension/scripts/run_rv32_formal.py --require
          python3 chiplet_extension/scripts/run_external_mutation_matrix.py
      - name: Run focused native code coverage
        run: make -C chiplet_extension firmware-c-coverage
      - name: Upload compiled-firmware evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-firmware-closure
          path: |
            chiplet_extension/reports/firmware_c_*.csv
            chiplet_extension/reports/firmware_c_*.md
            chiplet_extension/reports/firmware_c_*.txt
            chiplet_extension/reports/rv32_*.csv
