<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Firmware-driven UCIe chiplet SoC verification architecture</title>
  <desc id="desc">A layered architecture showing RV32 firmware and optional AXI-Lite control, the Die A queued DMA and banked memories, the UCIe-style link to Die B AES, UPF power intent, and verification evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#264653"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#3a67a3"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#eef3f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#15272d" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 30px 'DejaVu Sans', sans-serif; fill: #172a31; }
      .subtitle { font: 400 15px 'DejaVu Sans', sans-serif; fill: #52656d; }
      .lane { font: 700 13px 'DejaVu Sans', sans-serif; letter-spacing: 1.4px; }
      .heading { font: 700 19px 'DejaVu Sans', sans-serif; }
      .body { font: 400 13px 'DejaVu Sans', sans-serif; }
      .small { font: 400 12px 'DejaVu Sans', sans-serif; }
      .metric { font: 700 20px 'DejaVu Sans', sans-serif; fill: #17343c; }
      .metricLabel { font: 400 11px 'DejaVu Sans', sans-serif; fill: #52656d; }
      .control { fill: #e7f3ef; stroke: #2a9d8f; }
      .data { fill: #fff4d8; stroke: #c68b16; }
      .service { fill: #e9edfb; stroke: #5a6fc2; }
      .power { fill: #f8e8dc; stroke: #d46b3c; }
      .evidence { fill: #e9eef1; stroke: #60737c; }
      .box { stroke-width: 2; rx: 10; filter: url(#shadow); }
    </style>
  </defs>

  <rect width="1440" height="760" fill="url(#bg)"/>
  <text x="56" y="54" class="title">Firmware-Driven UCIe Chiplet SoC Verification</text>
  <text x="56" y="82" class="subtitle">Control, payload, low-power intent, and verification evidence are separated so each path is independently testable.</text>

  <text x="56" y="121" class="lane" fill="#217c70">CONTROL PLANE</text>
  <line x1="178" y1="116" x2="1384" y2="116" stroke="#a9cbc4" stroke-width="1"/>

  <g>
    <rect x="56" y="140" width="220" height="104" class="box control"/>
    <text x="78" y="169" class="heading" fill="#174c45">ROM-Backed RV32</text>
    <text x="78" y="193" class="body" fill="#285c55">12 firmware scenarios</text>
    <text x="78" y="214" class="body" fill="#285c55">LW / SW / polling / IRQ</text>
    <text x="78" y="235" class="small" fill="#416e68">No testbench CSR programming</text>

    <rect x="326" y="140" width="180" height="104" class="box control"/>
    <text x="350" y="169" class="heading" fill="#174c45">APB MMIO</text>
    <text x="350" y="193" class="body" fill="#285c55">0x100-0x184 window</text>
    <text x="350" y="214" class="body" fill="#285c55">waits + error response</text>
    <text x="350" y="235" class="small" fill="#416e68">retirement waits for PREADY</text>

    <rect x="556" y="140" width="200" height="104" class="box control"/>
    <text x="580" y="169" class="heading" fill="#174c45">DMA / Power CSRs</text>
    <text x="580" y="193" class="body" fill="#285c55">descriptor staging</text>
    <text x="580" y="214" class="body" fill="#285c55">doorbell + completion</text>
    <text x="580" y="235" class="small" fill="#416e68">IRQ, retention, maintenance</text>

    <rect x="806" y="140" width="238" height="104" class="box evidence" stroke-dasharray="7 5"/>
    <text x="830" y="169" class="heading" fill="#394c55">Optional AXI-Lite</text>
    <text x="830" y="193" class="body" fill="#4e626b">CSR integration collateral</text>
    <text x="830" y="214" class="body" fill="#4e626b">18 / 18 protocol points</text>
    <text x="830" y="235" class="small" fill="#667a83">Not the chiplet payload path</text>
  </g>

  <g fill="none" stroke="#2a9d8f" stroke-width="3" marker-end="url(#arrow)">
    <path d="M276 192 H326"/>
    <path d="M506 192 H556"/>
  </g>
  <path d="M806 192 H756" fill="none" stroke="#60737c" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow)"/>

  <text x="56" y="291" class="lane" fill="#a06b0a">PAYLOAD DATA PLANE</text>
  <line x1="218" y1="286" x2="1384" y2="286" stroke="#ddc58f" stroke-width="1"/>

  <g>
    <rect x="56" y="310" width="470" height="205" class="box data"/>
    <text x="80" y="342" class="heading" fill="#6d4b08">Die A - Compute and DMA</text>

    <rect x="80" y="365" width="130" height="114" rx="7" fill="#fffaf0" stroke="#d4a649"/>
    <text x="96" y="389" class="body" font-weight="700" fill="#6d4b08">Source SRAM</text>
    <text x="96" y="412" class="small" fill="#765d2d">256 x 64-bit</text>
    <text x="96" y="432" class="small" fill="#765d2d">2 banks + parity</text>
    <text x="96" y="452" class="small" fill="#765d2d">retained / invalid</text>

    <rect x="226" y="365" width="130" height="114" rx="7" fill="#fffaf0" stroke="#d4a649"/>
    <text x="242" y="389" class="body" font-weight="700" fill="#6d4b08">Queued DMA</text>
    <text x="242" y="412" class="small" fill="#765d2d">4 submit entries</text>
    <text x="242" y="432" class="small" fill="#765d2d">1 active descriptor</text>
    <text x="242" y="452" class="small" fill="#765d2d">timeout + error</text>

    <rect x="372" y="365" width="130" height="114" rx="7" fill="#fffaf0" stroke="#d4a649"/>
    <text x="388" y="389" class="body" font-weight="700" fill="#6d4b08">Destination</text>
    <text x="388" y="412" class="small" fill="#765d2d">2 banks + parity</text>
    <text x="388" y="432" class="small" fill="#765d2d">4 completion entries</text>
    <text x="388" y="452" class="small" fill="#765d2d">level IRQ</text>

    <rect x="576" y="310" width="235" height="205" class="box data"/>
    <text x="600" y="342" class="heading" fill="#6d4b08">Die A Adapter</text>
    <text x="600" y="374" class="body" fill="#765d2d">256-bit FLIT packetizer</text>
    <text x="600" y="398" class="body" fill="#765d2d">credits + CRC-8</text>
    <text x="600" y="422" class="body" fill="#765d2d">retry identity tracking</text>
    <text x="600" y="446" class="body" fill="#765d2d">ordering + backpressure</text>
    <text x="600" y="478" class="small" fill="#8a703e">Return data retires to DMA</text>

    <rect x="861" y="310" width="230" height="205" class="box evidence"/>
    <text x="885" y="342" class="heading" fill="#394c55">UCIe-Style Link</text>
    <text x="885" y="374" class="body" fill="#4e626b">behavioral PHY + channel</text>
    <text x="885" y="398" class="body" fill="#4e626b">latency + jitter</text>
    <text x="885" y="422" class="body" fill="#4e626b">CRC + lane faults</text>
    <text x="885" y="446" class="body" fill="#4e626b">retry + retraining</text>
    <text x="885" y="478" class="small" fill="#667a83">Bidirectional service traffic</text>

    <rect x="1141" y="310" width="243" height="205" class="box service"/>
    <text x="1165" y="342" class="heading" fill="#34427e">Die B - AES Service</text>
    <text x="1165" y="374" class="body" fill="#46558d">FLIT depacketization</text>
    <text x="1165" y="398" class="body" fill="#46558d">2 x 64-bit aggregation</text>
    <text x="1165" y="422" class="body" fill="#46558d">iterative AES-128</text>
    <text x="1165" y="446" class="body" fill="#46558d">ordered ciphertext return</text>
    <text x="1165" y="478" class="small" fill="#6370a0">Checked by independent model</text>
  </g>

  <g fill="none" stroke="#3a67a3" stroke-width="4">
    <path d="M526 403 H576" marker-end="url(#arrowBlue)"/>
    <path d="M811 403 H861" marker-end="url(#arrowBlue)"/>
    <path d="M1091 403 H1141" marker-end="url(#arrowBlue)"/>
    <path d="M1260 515 C1210 552 736 552 690 515" marker-end="url(#arrowBlue)"/>
  </g>
  <text x="886" y="546" class="small" fill="#3a67a3">ciphertext return path</text>

  <text x="56" y="588" class="lane" fill="#b5532c">POWER INTENT AND VERIFICATION EVIDENCE</text>
  <line x1="372" y1="583" x2="1384" y2="583" stroke="#e4b9a7" stroke-width="1"/>

  <g>
    <rect x="56" y="606" width="348" height="112" class="box power"/>
    <text x="80" y="636" class="heading" fill="#843b20">Tool-Neutral UPF 4.0</text>
    <text x="80" y="662" class="body" fill="#914b30">7 domains + switches + clamp isolation</text>
    <text x="80" y="684" class="body" fill="#914b30">DMA context/memory retention + PST</text>
    <text x="80" y="706" class="small" fill="#a2644d">RUN / CRYPTO_ONLY / SLEEP / DEEP_SLEEP</text>

    <rect x="438" y="606" width="408" height="112" class="box evidence"/>
    <text x="462" y="636" class="heading" fill="#394c55">Independent Verification</text>
    <text x="462" y="662" class="body" fill="#4e626b">SV drivers, monitors, scoreboards, SVA</text>
    <text x="462" y="684" class="body" fill="#4e626b">Python AES/DMA model + C CRC model</text>
    <text x="462" y="706" class="small" fill="#667a83">Directed, negative, bug-injection, seeded-random</text>

    <rect x="880" y="606" width="504" height="112" class="box control"/>
    <text x="904" y="636" class="heading" fill="#174c45">Checked-In Evidence</text>
    <text x="904" y="672" class="metric">70/70</text>
    <text x="904" y="692" class="metricLabel">stable runs</text>
    <text x="1000" y="672" class="metric">60/60</text>
    <text x="1000" y="692" class="metricLabel">functional bins</text>
    <text x="1096" y="672" class="metric">26/26</text>
    <text x="1096" y="692" class="metricLabel">power targets</text>
    <text x="1192" y="672" class="metric">12/12</text>
    <text x="1192" y="692" class="metricLabel">firmware</text>
    <text x="1284" y="672" class="metric">52</text>
    <text x="1284" y="692" class="metricLabel">invariants</text>
  </g>

  <g fill="none" stroke="#d46b3c" stroke-width="2" stroke-dasharray="6 5">
    <path d="M230 606 C230 564 255 545 291 515" marker-end="url(#arrow)"/>
    <path d="M326 606 C430 558 895 550 974 515" marker-end="url(#arrow)"/>
    <path d="M382 606 C610 548 1192 546 1260 515" marker-end="url(#arrow)"/>
  </g>
</svg>
